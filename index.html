<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>포인트 탭 · 진행중 이벤트 구좌</title>
<style>
  :root{
    --purple060:#5D4CF2;
    --purple-light:#EEEBFF;
    --gray010:#F6F6F9;
    --gray020:#EDEEF2;
    --gray030:#E1E3EA;
    --gray040:#C8CBD4;
    --gray050:#AEB2BE;
    --text01:#15161B;
    --text02:#4A4D57;
    --text03:#9498A4;
    --white:#FFFFFF;
    --bg:#F2F3F6;
    --radius-card:20px;
    --radius-pill:999px;
    --font:'PretendardFin','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{
    font-family:var(--font);
    background:linear-gradient(160deg,#ECEAFE 0%,#F4F5F8 45%,#EAF0FB 100%);
    min-height:100vh;color:var(--text01);
    padding:40px 20px 80px;display:flex;flex-direction:column;align-items:center;
  }

  .head{max-width:1000px;width:100%;margin-bottom:24px;text-align:center;}
  .head .eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.04em;
    color:var(--purple060);background:var(--purple-light);padding:6px 14px;border-radius:var(--radius-pill);margin-bottom:14px;}
  .head h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px;}
  .head p{font-size:14px;color:var(--text02);line-height:1.6;}
  .head .rule{margin-top:14px;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text02);
    background:#fff;border:1px solid var(--gray020);padding:8px 14px;border-radius:var(--radius-pill);
    box-shadow:0 6px 18px rgba(20,22,40,.05);}
  .head .rule b{color:var(--purple060);font-weight:800;}

  .row{display:flex;gap:34px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;width:340px;position:relative;}
  .cap{text-align:center;margin-bottom:16px;max-width:360px;}
  .cap .tag{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--purple060);
    padding:4px 12px;border-radius:var(--radius-pill);margin-bottom:8px;}
  .cap .name{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
  .cap .why{font-size:12px;color:var(--text02);line-height:1.55;}
  .cap .why b{color:var(--text01);}

  .phone{width:340px;height:760px;background:var(--bg);border-radius:32px;
    border:1px solid var(--gray020);box-shadow:0 20px 48px rgba(20,22,40,.13);
    overflow:hidden;position:relative;display:flex;flex-direction:column;}
  .statusbar{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;
    padding:13px 24px 5px;font-size:13px;font-weight:600;background:var(--bg);z-index:20;}
  .statusbar .right{display:flex;align-items:center;gap:5px;font-size:12px;}
  .battery{background:#1c1d22;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
  .pageheader{flex:0 0 auto;padding:8px 18px 10px;background:var(--bg);z-index:15;}
  .pageheader h2{font-size:21px;font-weight:800;letter-spacing:-.03em;}
  .screen{flex:1;overflow-y:auto;padding:4px 14px 14px;}
  .screen::-webkit-scrollbar{width:0;}
  .card{background:var(--white);border-radius:var(--radius-card);margin-bottom:12px;border:1px solid #F1F1F6;}

  /* points card with exchange */
  .points{padding:13px 15px;display:flex;align-items:center;gap:11px;
    background:linear-gradient(100deg,#F3F1FF,#FBFAFF);}
  .points .pcoin{width:36px;height:36px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%,#FFD66B,#F5A623);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;}
  .points .pbody{flex:1;}
  .points .pamt{font-size:20px;font-weight:800;letter-spacing:-.02em;}
  .points .pamt span{font-size:13px;}
  .points .psub{font-size:11px;color:var(--text03);margin-top:2px;}
  .points .gift{flex:0 0 auto;background:var(--purple060);color:#fff;font-size:12px;font-weight:700;
    padding:9px 13px;border-radius:var(--radius-pill);display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .points .gift svg{width:14px;height:14px;}

  /* section title */
  .sec-ttl{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:800;
    margin:14px 4px 9px;letter-spacing:-.02em;}
  .sec-ttl .l{display:flex;align-items:center;gap:6px;}
  .sec-ttl .more{font-size:11px;font-weight:600;color:var(--text03);}

  /* events grid (3 events) */
  .events{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
  .ev{background:var(--white);border-radius:14px;overflow:hidden;border:1px solid #F1F1F6;}
  .ev .top{height:56px;display:flex;align-items:center;justify-content:center;font-size:23px;}
  .ev.e1 .top{background:linear-gradient(135deg,#E0D9FF,#C3B5FE);}
  .ev.e2 .top{background:linear-gradient(135deg,#FFD9E1,#FFC0CE);}
  .ev.e3 .top{background:linear-gradient(135deg,#BFE9F2,#8FD9EA);}
  .ev.e4 .top{background:linear-gradient(135deg,#C7F0D8,#9FE3BC);}
  .ev.e5 .top{background:linear-gradient(135deg,#FFE6B8,#FFCF85);}
  .ev .lbl{font-size:12px;font-weight:800;text-align:center;line-height:1.22;margin:8px 4px 3px;letter-spacing:-.02em;
    min-height:29px;display:flex;align-items:center;justify-content:center;}
  .ev .rwd{font-size:10px;font-weight:700;color:var(--purple060);text-align:center;margin-bottom:7px;}
  .ev .cta{font-size:11px;font-weight:700;color:var(--purple060);background:var(--purple-light);
    text-align:center;padding:6px 0;margin:0 7px 8px;border-radius:var(--radius-pill);}

  /* carousel mode (4-5 events) */
  .events.carousel{display:flex;overflow-x:auto;gap:8px;scroll-snap-type:x mandatory;
    scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;}
  .events.carousel::-webkit-scrollbar{display:none;}
  .events.carousel .ev{flex:0 0 30%;scroll-snap-align:start;}

  /* BD offer cards (full list - 7개) */
  .offer{display:flex;align-items:center;gap:11px;padding:11px 13px;}
  .offer .ico{width:42px;height:42px;border-radius:11px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;text-align:center;line-height:1;}
  .offer .ico.b1{background:linear-gradient(135deg,#3B6FF5,#5A87FF);}
  .offer .ico.b2{background:linear-gradient(135deg,#0046FF,#3265F5);}
  .offer .ico.b3{background:linear-gradient(135deg,#F58220,#FFA84A);}
  .offer .ico.b4{background:linear-gradient(135deg,#FFC547,#FFB020);}
  .offer .ico.b5{background:linear-gradient(135deg,#062F6F,#0A4794);font-size:13px;}
  .offer .ico.b6{background:linear-gradient(135deg,#F45EE0,#D24BE8);}
  .offer .ico.b7{background:linear-gradient(135deg,#21B891,#3DCEA5);}
  .offer .body{flex:1;min-width:0;font-size:13px;font-weight:700;line-height:1.35;letter-spacing:-.01em;}
  .offer .act{flex:0 0 auto;background:#fff;color:var(--purple060);font-size:11px;font-weight:700;
    padding:6px 11px;border-radius:var(--radius-pill);white-space:nowrap;border:1px solid var(--purple060);}

  /* 핀다포스트 carousel */
  .postsec{margin-top:6px;}
  .postsec .head-row{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 8px;}
  .postsec .head-row .ttl{font-size:15px;font-weight:800;letter-spacing:-.02em;}
  .postsec .head-row .sub{font-size:11px;color:var(--text03);margin-top:2px;}
  .postsec .head-row .more{font-size:11px;color:var(--text03);font-weight:600;}
  .posts{display:flex;overflow-x:auto;gap:8px;scroll-snap-type:x mandatory;
    scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;}
  .posts::-webkit-scrollbar{display:none;}
  .post{flex:0 0 100%;scroll-snap-align:start;background:#1F2127;color:#fff;border-radius:18px;
    padding:18px 16px;min-height:170px;position:relative;display:flex;flex-direction:column;justify-content:space-between;
    overflow:hidden;}
  .post .ptitle{font-size:15px;font-weight:800;line-height:1.35;letter-spacing:-.02em;}
  .post .pemoji{position:absolute;right:14px;bottom:46px;font-size:38px;opacity:.92;}
  .post .ppoint{display:inline-flex;align-items:center;gap:5px;background:#fff;color:#1F2127;
    font-size:11px;font-weight:800;padding:6px 10px;border-radius:var(--radius-pill);align-self:flex-start;}
  .post .ppoint .pdot{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFD66B,#F5A623);
    color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
  .dots span{width:6px;height:6px;border-radius:50%;background:var(--gray040);}
  .dots span.on{background:var(--text01);width:14px;border-radius:3px;}

  /* bottom nav */
  .tabbar{flex:0 0 auto;display:flex;justify-content:space-around;align-items:center;
    padding:9px 0 18px;background:var(--white);border-top:1px solid var(--gray020);z-index:20;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--gray050);}
  .tab .ti{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
  .tab .ti > svg{width:20px;height:20px;display:block;}
  .tab .tl{font-size:10px;font-weight:600;}
  .tab.active{color:var(--text01);}
  .tab.active .pcircle{width:22px;height:22px;border-radius:50%;background:var(--purple060);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
</style>
</head>
<body>

  <div class="head">
    <span class="eyebrow">핀다 · 포인트 탭 (네이밍 확정)</span>
    <h1>진행중 이벤트 구좌 · 운영 룰</h1>
    <p>출석체크·랜덤포인트 2개는 상시. 그 외 프로모션 이벤트로 <b>최소 1개 ~ 최대 3개</b>까지 추가 노출.</p>
    <div class="rule">동시 진행 이벤트는 항상 <b>&nbsp;3개 이상 ~ 5개 이하</b></div>
  </div>

  <div class="row" id="row"></div>

<script>
  const giftSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="1.5"/><path d="M3 12h18M12 8v13"/><path d="M12 8s-1.2-4-3.5-4S6 7 8.5 8M12 8s1.2-4 3.5-4S18 7 15.5 8"/></svg>';
  const homeSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.5V19h12v-8.5"/></svg>';
  const allSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>';

  // ── 포인트 카드 ──
  const pointsCard = `
    <div class="card points">
      <div class="pcoin">P</div>
      <div class="pbody">
        <div class="pamt">3,644 <span>P</span></div>
        <div class="psub">모인 포인트로<br>상품을 교환하세요</div>
      </div>
      <div class="gift">${giftSvg} 상품 교환하기</div>
    </div>`;

  // ── 진행중 이벤트 구성 ──
  // 상시: 출석체크 + 랜덤포인트 (e2, e3)
  // 프로모션: 대출비교 이벤트(상시 그로스), 저금통 챌린지, 친구초대
  const FIXED  = [
    {cls:'e2', ic:'📅', lbl:'출석체크',           rwd:'매일 +30P',  cta:'출석하기'},
    {cls:'e3', ic:'🎰', lbl:'랜덤<br/>포인트',    rwd:'최대 1만P',  cta:'돌리기'}
  ];
  const PROMOS = [
    {cls:'e1', ic:'💰', lbl:'대출비교<br/>이벤트', rwd:'최대 1만P',  cta:'참여하기'},
    {cls:'e4', ic:'🐷', lbl:'저금통<br/>챌린지',   rwd:'최대 2천P',  cta:'시작하기'},
    {cls:'e5', ic:'🎉', lbl:'친구 초대',           rwd:'1인당 1천P', cta:'초대하기'}
  ];
  function eventList(count){
    // 항상 프로모션을 맨 앞에 1개 이상 + FIXED 2개 + 추가 프로모션
    const promoCount = count - FIXED.length; // 1,2,3
    return [...PROMOS.slice(0, promoCount), ...FIXED];
  }
  const evCard = e => `<div class="ev ${e.cls}"><div class="top">${e.ic}</div><div class="lbl">${e.lbl}</div><div class="rwd">${e.rwd}</div><div class="cta">${e.cta}</div></div>`;

  function eventsBlock(count){
    const list = eventList(count);
    if(count <= 3){
      return `
        <div class="sec-ttl"><span class="l">🔥 진행중 이벤트</span></div>
        <div class="events" style="grid-template-columns:repeat(${list.length},1fr)">${list.map(evCard).join('')}</div>`;
    }
    return `
      <div class="sec-ttl"><span class="l">🔥 진행중 이벤트</span><span class="more">전체 ${list.length}</span></div>
      <div class="events carousel">${list.map(evCard).join('')}</div>`;
  }

  // ── BD 광고 지면 (7개) ──
  const BD_LIST = [
    {cls:'b1', icoText:'현대', title:'최고 3억까지 추가 신청 OK'},
    {cls:'b2', icoText:'S',    title:'DSR 제한없이 당일대출 가능'},
    {cls:'b3', icoText:'OK!',  title:'본인 명의 차가 있다면 OK'},
    {cls:'b4', icoText:'☀️',   title:'서민금융 보증 최대 1,500만원'},
    {cls:'b5', icoText:'2%',   title:'SBI신용대출 최대 2% 금리할인'},
    {cls:'b6', icoText:'💳',   title:'카드비교 최대 19만원 캐시백'},
    {cls:'b7', icoText:'💼',   title:'사장님 운영자금 최대 1억'}
  ];
  const bdCard = b => `
    <div class="card offer">
      <div class="ico ${b.cls}">${b.icoText}</div>
      <div class="body">${b.title}</div>
      <div class="act">광고 보면 5P</div>
    </div>`;
  const bdBlock = `
    <div class="sec-ttl"><span class="l">💼 추천 금융상품</span><span class="more">전체 ${BD_LIST.length}</span></div>
    ${BD_LIST.map(bdCard).join('')}`;

  // ── 핀다포스트 (5개, 1개씩 스와이프) ──
  const POSTS = [
    {title:'새희망홀씨 대출<br/>이용기회가 확대됐어요',           emoji:'🌱', point:15},
    {title:'금리 인하 시대,<br/>신용대출 갈아타기 전략',         emoji:'📉', point:15},
    {title:'카드 결제일,<br/>이렇게 정하면 돈 모인다',           emoji:'💳', point:15},
    {title:'전세 vs 월세,<br/>2026년 진짜 손익 계산',            emoji:'🏠', point:15},
    {title:'연말정산 미리 체크!<br/>놓치면 손해 보는 공제 5가지', emoji:'🧾', point:15}
  ];
  const postCard = (p,i) => `
    <div class="post" data-i="${i}">
      <div class="ptitle">${p.title}</div>
      <div class="pemoji">${p.emoji}</div>
      <div class="ppoint"><span class="pdot">P</span> ${p.point}P 적립</div>
    </div>`;
  const postBlock = `
    <div class="postsec">
      <div class="head-row">
        <div>
          <div class="ttl">핀다포스트</div>
          <div class="sub">금융 소식을 전달드립니다</div>
        </div>
        <div class="more">더보기</div>
      </div>
      <div class="posts">${POSTS.map(postCard).join('')}</div>
      <div class="dots">${POSTS.map((_,i)=>`<span${i===0?' class="on"':''}></span>`).join('')}</div>
    </div>`;

  // ── 시나리오 (최소 3개 / 최대 5개) ──
  const VARIANTS = [
    {tag:'최소 3개일 경우', name:'프로모션 1 + 상시 2',
     count:3,
     why:'프로모션 이벤트가 1개만 진행 중일 때. <b>출석체크·랜덤포인트</b>가 상시로 깔리고 그 앞에 프로모션 하나가 붙어 <b>3칸 그리드</b>로 정렬됩니다.'},
    {tag:'최대 5개일 경우', name:'프로모션 3 + 상시 2',
     count:5,
     why:'프로모션 이벤트가 가장 많을 때. 그리드로 다 못 담아 <b>가로 캐러셀</b>로 전환. 5개 초과는 운영 부담·인지 저하로 금지.'}
  ];

  function phone(v){
    const screen = pointsCard + eventsBlock(v.count) + bdBlock + postBlock;
    return `
    <div class="col">
      <div class="cap">
        <span class="tag">${v.tag}</span>
        <div class="name">${v.name}</div>
        <div class="why">${v.why}</div>
      </div>
      <div class="phone">
        <div class="statusbar"><span>12:04</span><span class="right">📶 5G <span class="battery">100</span></span></div>
        <div class="pageheader"><h2>포인트</h2></div>
        <div class="screen">${screen}</div>
        <div class="tabbar">
          <div class="tab"><div class="ti">${homeSvg}</div><div class="tl">홈</div></div>
          <div class="tab active"><div class="ti"><span class="pcircle">P</span></div><div class="tl">포인트</div></div>
          <div class="tab"><div class="ti">${allSvg}</div><div class="tl">전체</div></div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('row').innerHTML = VARIANTS.map(phone).join('');

  // 핀다포스트 캐러셀 스크롤에 따라 dot 동기화
  document.querySelectorAll('.posts').forEach(track => {
    const dots = track.parentElement.querySelectorAll('.dots span');
    track.addEventListener('scroll', () => {
      const i = Math.round(track.scrollLeft / track.clientWidth);
      dots.forEach((d, di) => d.classList.toggle('on', di === i));
    }, {passive:true});
  });
</script>
</body>
</html>
